services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  replay:                      # REPLAY lane → session "replay" (Monza, the default clip)
    build: .
    environment:
      ROLE: replay
      REDIS_URL: redis://redis:6379
      SESSION_KEY: replay
    depends_on: [redis]

  live:                        # LIVE lane → session "live", now published by Python
    build:
      context: .
      dockerfile: ingest/Dockerfile.live
    environment:
      REDIS_URL: redis://redis:6379
      SESSION_KEY: live
    command: ["--replay-clip", "/data/replays/silverstone-2024-race.jsonl", "--session", "live"]
    volumes:
      - ./data:/data:ro
    depends_on: [redis]

  compare-2023:                # COMPARE left  → session "compare-monza-2023"
    build: .
    environment:
      ROLE: replay
      REDIS_URL: redis://redis:6379
      SESSION_KEY: compare-monza-2023
      CLIP_FILE: /data/replays/monza-2023-race.jsonl
      PHASE_WALLCLOCK: "1"
    depends_on: [redis]

  compare-2024:                # COMPARE right → session "compare-monza-2024"
    build: .
    environment:
      ROLE: replay
      REDIS_URL: redis://redis:6379
      SESSION_KEY: compare-monza-2024
      CLIP_FILE: /data/replays/monza-2024-race.jsonl
      PHASE_WALLCLOCK: "1"
    depends_on: [redis]

  gateway:
    build: .
    environment:
      ROLE: gateway
      REDIS_URL: redis://redis:6379
      SESSION_KEY: replay       # initial source the gateway fans out
    ports: ["8080:8080"]
    depends_on: [redis, replay, live]
