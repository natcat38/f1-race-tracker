services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  replay:
    build: .
    environment:
      ROLE: replay
      REDIS_URL: redis://redis:6379
    depends_on: [redis]
  gateway:
    build: .
    environment:
      ROLE: gateway
      REDIS_URL: redis://redis:6379
    ports: ["8080:8080"]
    depends_on: [redis, replay]
